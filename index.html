<!DOCTYPE html>
<html>
<head>
    <title>Meeting Intelligence Hub</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; margin-top: 10px; }
        button { padding: 10px; margin-top: 10px; }
        #chatBox { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Meeting Intelligence Hub</h1>

    <!-- Upload -->
    <h3>Upload Transcript</h3>
    <input type="file" id="fileInput">
    <textarea id="transcript" placeholder="Transcript will appear here..."></textarea>

    <!-- Extract -->
    <button onclick="extractData()">Extract Decisions & Actions</button>
    <div id="result"></div>

    <!-- Chat -->
    <h3>Chatbot</h3>
    <div id="chatBox"></div>
    <input type="text" id="userInput" placeholder="Ask a question...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="app.js"></script>
</body>
</html>
